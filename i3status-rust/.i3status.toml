icons_format = "{icon}"

[theme]
#theme = "srcery"
theme = "plain"
[theme.overrides]
idle_fg = "#ffffff"
separator = '|'
separator_fg = '#343942'

[icons]
icons = "awesome5"
[icons.overrides]
bat = " | | "
bat_full = " |X| "
bat_charging = " |^| "
bat_discharging = " |v| "

[[block]]
block = "keyboard_layout"
interval = 10 
[[block.click]]
button = "left"
cmd = "sh ~/bin/kblayout.sh"

[[block]]
block = "nvidia_gpu"
format = " $icon $name $utilization $temperature "

[[block]]
block = "temperature"
format = " $icon $average"

[[block]]
block = "cpu"
format = " $icon $utilization "

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 20
warning = 20.0
alert = 10.0
format = " $icon SDD: $available.eng(w:2) "

[[block]]
block = "memory"
format = " $icon $mem_used_percents.eng(w:2) "

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "time"
interval = 60
[block.format]
full = " $icon $timestamp.datetime(f:'%a %Y-%m-%d %R', l:it_IT) "
short = " $icon $timestamp.datetime(f:%R) "
