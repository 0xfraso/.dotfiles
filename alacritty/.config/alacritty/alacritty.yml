# Opacity

window:
  opacity: 1

  # Window class (Linux/BSD only):
  class:
    # Application instance name
    instance: Alacritty
    # General application class
    general: Alacritty
  padding:
    x: 10
    y: 10
font:
  normal:
    family: JetBrains Mono Nerd Font
    style: normal
  bold:
    family: JetBrains Mono Nerd Font
    style: Bold
  italic:
    family: JetBrains Mono Nerd Font
    style: Italic
  size: 15

import:
  - ~/.config/alacritty/catppuccin_mocha.yml
  # - ~/.config/alacritty/carbonfox.yml
