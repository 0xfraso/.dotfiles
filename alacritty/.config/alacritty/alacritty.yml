window:
  # Window class (Linux/BSD only):
  class:
    # Application instance name
    instance: Alacritty
    # General application class
    general: Alacritty
  padding:
    x: 10
    y: 10
font:
  normal:
    family: JetBrainsMono NF
    style: normal
  bold:
    family: JetBrainsMono NF
    style: Bold
  italic:
    family: JetBrainsMono NF
    style: Italic

import:
  - ~/.alacritty.local.yml

