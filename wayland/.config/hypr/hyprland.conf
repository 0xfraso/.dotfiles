
########################################################################################
AUTOGENERATED HYPR CONFIG.
PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
########################################################################################

$wofi_command = wofi --show drun --columns=3 --allow-images --location=bottom --y=-50 --prompt=Run

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=,preferred,auto,auto

monitor=DP-1,3440x1440@100,0x0,1
monitor=DVI-I-1,1920x1080@60,3440x0,1

# rotate second monitor
monitor=DVI-I-1,transform,1

# default workspaces

workspace = DP-1, 1
workspace = DVI-I-1, 10

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# autostart applications

exec-once = ~/.dotfiles/bin/bin/reload_waybar.sh &
exec-once = nm-applet --indicator &
exec-once = blueman-applet &
exec-once = ~/.dotfiles/bin/bin/wob.sh &
exec-once = swaybg -m fill -i ~/.dotfiles/wallpapers/smile.jpg


# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS,1

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us,it
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more


    no_cursor_warps = 0
    cursor_inactive_timeout = 0

    gaps_in = 0
    gaps_out = 0
    border_size = 3
    col.active_border = rgba(BBBBBBBB)
    col.inactive_border = rgba(282828ee)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 0
    blur = yes
    blur_size = 10
    blur_passes = 1
    blur_new_optimizations = on

    drop_shadow = yes
    shadow_range = 30
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
  enabled = true

  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1

  animation = windows, 1, 5, overshot, slide
  animation = windowsOut, 1, 4, smoothOut, slide
  animation = windowsMove, 1, 4, default
  animation = border, 1, 10, default
  animation = fade, 1, 10, smoothIn
  animation = fadeDim, 1, 10, smoothIn
  animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    no_gaps_when_only = false
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic mouse V1 {
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, b, exec, brave
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, t, exec, thunar
bind = $mainMod, E, togglesplit # dwindle
bind = $mainMod, SPACE, togglefloating
bind = $mainMod, D, exec, $wofi_command
bind = $mainMod, P, pseudo # dwindle
bind = $mainMod, F, fullscreen # fullscreen
bind = $mainMod SHIFT, F, fakefullscreen # fullscreen

bind = $mainMod CONTROL, Q, exec, ~/.config/wofi/powermenu.sh

#toggle alacritty opacity
bind = $mainMod CTRL, A, exec, ~/.dotfiles/bin/bin/toggle_alacritty_opacity
#toggle kb layout
bind = $mainMod CTRL, K, exec, hyprctl switchxkblayout rongyuan-tr-kc3068-2.4g-1 next
#toggle blur
bind = $mainMod CTRL, Z, exec, ~/.config/hypr/scripts/toggle_hyprland_blur.sh

#notetaker
bind = $mainMod, N, exec, alacritty -e ~/.dotfiles/bin/bin/notetaker

# Move focus with mainMod + hjkl keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move focused window to direction with mainMod + hjkl keys
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# playerctl binds
bind = $mainMod CTRL, O, exec, playerctl play-pause
bind = $mainMod CTRL, P, exec, playerctl previous
bind = $mainMod CTRL, N, exec, playerctl next

# special workspace
bind = $mainMod, MINUS, togglespecialworkspace
bind = $mainMod SHIFT, MINUS, movetoworkspace, special

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# resize windows
bind = $mainMod CTRL, l, resizeactive, 100 0
bind = $mainMod CTRL, h, resizeactive, -100 0
bind = $mainMod CTRL, j, resizeactive, 0 100
bind = $mainMod CTRL, k, resizeactive, 0 -100

# volume control
$WOBSOCK = $XDG_RUNTIME_DIR/wob.sock

bind = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% && pactl get-sink-volume @DEFAULT_SINK@ | head -n 1| awk '{print substr($5, 1, length($5)-1)}' > $WOBSOCK
bind = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% && pactl get-sink-volume @DEFAULT_SINK@ | head -n 1 | awk '{print substr($5, 1, length($5)-1)}' > $WOBSOCK
bind = $mainMod, m, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle && notify-send -i audio-headset $(pactl get-sink-mute @DEFAULT_SINK@)

bind = $mainMod, EQUAL, exec, alacritty --class pulsemixer,pulsemixer -e pulsemixer

# window rules 

windowrulev2 = float,class:^(thunar)$
windowrulev2 = float,class:^(pulsemixer)$
#windowrulev2 = float,class:^(whatsdesk)$

windowrule = float,pavucontrol
windowrule = center,pavucontrol
