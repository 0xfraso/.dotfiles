;----------------------------------------------------------
;            COLORS
;----------------------------------------------------------

[colors]
rounds =            #1e222a
background =        ${xrdb:background}
text =              #161821
background-alt =    #444
foreground =        ${xrdb:foreground}
foreground-alt =    #555
primary =           ${xrdb:color5}
secondary =         #e60053
alert =             #bd2c40
magenta =           ${xrdb:color5}
green =             ${xrdb:color2}
blue =              ${xrdb:color4}
red =               ${xrdb:color1}
yellow =            ${xrdb:color3}
cyan =              ${xrdb:color6}

[bar/bar]
monitor = ${env:MONITOR:}
width = 100%
height = 24
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

wm-restack = i3

bottom = false

spacing = 2

scroll-up = i3wm-wsnext
scroll-down = i3wm-wsprev

border-size = 4
border-color = ${colors.background}

font-0 = Iosevka:style=Bold:pixelsize=13;2
font-1 = FontAwesome:style=Regular:pixelsize=14;2

modules-left = i3 
modules-center = date 
modules-right = bluetooth wlan volume backlight battery powermenu

cursor-click = pointer
cursor-scroll = 

line-size = 3

tray-position = left
tray-padding = 2
tray-background = ${colors.foreground-alt}

separator = " | "

;----------------------------------------------------------
;            M O D U L E S
;----------------------------------------------------------

;   (_)__ / __ __ ___ __  
;   | ||_ \ \ V  V / '  \ 
;   |_|___/  \_/\_/|_|_|_|
;                         

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
;strip-wsnumbers = true  ;This will split the workspace name on ':'
;ws-icon-0 = 1;%{T2} 1
;ws-icon-1 = 2;%{T2} 2
;ws-icon-2 = 3;%{T2} 3
;ws-icon-3 = 4;%{T2} 4
;ws-icon-4 = 5;%{T2} 5
;ws-icon-5 = 6;%{T2} 6
;ws-icon-6 = 7;%{T2} 7
;ws-icon-7 = 8;%{T2} 8
;ws-icon-8 = 9;%{T2} 9
;ws-icon-9 = 10;%{T2}ﭮ 10
;ws-icon-default =

; Only show workspaces on the same output as the bar
;pin-workspaces = true

label-mode-padding = 5
label-mode-foreground = #000
label-mode-background = ${colors.primary}

; focused = Active workspace on focused monitor
label-focused = %name%
label-focused-foreground = ${colors.primary}
label-focused-underline= ${colors.primary}
label-focused-padding = 2
; unfocused = Inactive workspace on any monitor

label-unfocused = %name%
label-unfocused-padding = 2

; visible = Active workspace on unfocused monitor
label-visible = %name%

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

; Separator in between workspaces
;label-separator = |

[module/temp]
type = internal/temperature
interval = 6.0
thermal-zone = 0
warn-temperature = 70

format = <label>
format-padding = 2
format-underline = 
format-warn = <label-warn>
format-warn-padding = 2
format-warn-foreground = ${colors.red}

label = %temperature-c%
label-warn =  %temperature-c%

[module/wlan]
type = internal/network
interface = ${env:DEFAULT_NETWORK_INTERFACE} 
interval = 1

format-connected-prefix = %{T2}
format-connected-prefix-foreground = ${colors.primary}
format-connected-prefix-padding = 1
;format-connected-prefix-underline = ${colors.primary}
format-connected = %{A1:~/.dotfiles/scripts/wifi.sh:}<label-connected>%{A}
format-connected-padding = 2
label-connected =  %downspeed%

;format-prefix-connected-underline = ${colors.primary}

format-disconnected-prefix = %{T2}
format-disconnected-prefix-foreground = ${colors.primary}
format-disconnected-prefix-padding = 1
;format-disconnected-prefix-underline = ${colors.primary}
format-disconnected = %{A1:~/.config/rofi/wifi.sh:}<label-disconnected>%{A}
format-disconnected-padding = 1
label-disconnected = " no connection"

[module/date]
type = internal/date
interval = 60
date = %a, %d %b
date-alt = 
time = %k:%M %p
time-alt = 
label = %date% %time%
format = <label>
format-padding = 2
format-prefix = %{T2} 
format-prefix-foreground = ${colors.primary}
format-prefix-font = 3
format-prefix-padding = 1

[module/backlight]
type = internal/backlight
card = amdgpu_bl1
format = <label> <bar>
format-prefix = "%{T2} "
format-prefix-foreground = ${colors.primary}
label =  %percentage%%

bar-width = 10
bar-foreground-0 = #55aa55
bar-foreground-1 = #55aa55
bar-foreground-2 = #55aa55
bar-foreground-3 = #55aa55
bar-foreground-4 = #f5a70a
bar-foreground-5 = #f5a70a
bar-foreground-6 = #ff5555
bar-gradient = true
bar-indicator = 
bar-indicator-font = 0
bar-fill = 
bar-fill-font = 2
bar-empty = -
bar-empty-font = 2
bar-empty-foreground = ${colors.foreground-alt}

[module/volume]
type = internal/pulseaudio
format-volume = <label-volume> <bar-volume>
format-volume-prefix = "%{T2} "
format-volume-prefix-foreground = ${colors.primary}
label-volume = %percentage%%
label-volume-foreground = ${root.foreground}
label-muted = %{T2} muted
format-muted-foreground = ${colors.alert}

bar-volume-width = 10
bar-volume-foreground-0 = #55aa55
bar-volume-foreground-1 = #55aa55
bar-volume-foreground-2 = #55aa55
bar-volume-foreground-3 = #55aa55
bar-volume-foreground-4 = #f5a70a
bar-volume-foreground-5 = #f5a70a
bar-volume-foreground-6 = #ff5555
bar-volume-gradient = true
bar-volume-indicator = 
bar-volume-indicator-font = 0
bar-volume-fill = 
bar-volume-fill-font = 2
bar-volume-empty = -
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.foreground-alt}

[module/battery]
type = internal/battery
full-at = 98
battery = BAT1
adapter = AC1
poll-interval = 1
time-format = %H:%M
format-charging-prefix = "%{T2} "
format-charging-prefix-foreground = ${colors.primary}
format-charging = <label-charging>
format-discharging = %{T2}<ramp-capacity> <label-discharging>
format-full = %{T2}<label-full>
format-full-foreground = ${colors.green}
label-full = %percentage%%
label-charging = %percentage%% %time%
label-discharging = %percentage%% %time% %consumption%W
format-charging-padding = 2
format-discharging-padding = 2
format-full-padding = 2

ramp-capacity-0 = 
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-foreground = ${colors.primary}
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60

format = <ramp> <label>
format-underline = #f50a4d
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.secondary}

[module/powermenu]
type = custom/text
content = %{T2} 
content-foreground = ${colors.red}
content-padding = 1
click-left = ~/.dotfiles/scripts/powermenu.sh

[module/bluetooth]
type = custom/script
exec = "bluetoothctl paired-devices | cut -d' ' -f2 | xargs -i -n1 bash -c "bluetoothctl info {} | grep -q 'Connected: yes' && bluetoothctl info {} | grep -o 'Alias: .*'" | awk -vORS=', ' '{sub($1 OFS,"")}1' | sed -e 's/, $//'"
exec-if = "[ $(bluetoothctl show | grep 'Powered: yes' | wc -l) -gt 0 ]"
interval = 5
click-left = ~/.config/rofi/bluetooth.sh
format-prefix = %{T2} 
format-prefix-foreground = ${colors.blue}

[settings]
screenchange-reload = true

; vim:ft=dosini
;
; format = %{A1:"action goes here" &:}<label>%{A}
